name: Publish GHCR Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/atjsh/wasmedge-demo

jobs:
  metadata:
    name: Resolve metadata
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"

  publish-sha:
    name: Publish SHA tag
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable SHA tag
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: wasi/wasm
          build-args: |
            ENABLE_AOT=0
          provenance: false
          sbom: false
          push: true
          tags: ${{ needs.metadata.outputs.image_name }}:${{ needs.metadata.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.title=wasmedge-demo
            org.opencontainers.image.description=Reference demo of a codesign-free browser-based GUI served from a WasmEdge WebAssembly container
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  verify-public:
    name: Verify public package
    runs-on: ubuntu-latest
    needs:
      - metadata
      - publish-sha
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure package visibility is public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          current_visibility=""
          for attempt in 1 2 3 4 5 6 7 8; do
            current_visibility="$(gh api user/packages/container/wasmedge-demo --jq '.visibility' 2>/dev/null || true)"
            if [ -n "$current_visibility" ]; then
              break
            fi
            echo "Package metadata not available yet; retrying..." >&2
            sleep 10
          done

          if [ "$current_visibility" != "public" ]; then
            gh api --method PATCH user/packages/container/wasmedge-demo -f visibility=public >/dev/null
          fi

      - name: Confirm package visibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          visibility=""
          for attempt in 1 2 3 4 5 6 7 8; do
            visibility="$(gh api user/packages/container/wasmedge-demo --jq '.visibility' 2>/dev/null || true)"
            if [ "$visibility" = "public" ]; then
              exit 0
            fi
            echo "Visibility is '${visibility:-unknown}' on attempt ${attempt}; retrying..." >&2
            sleep 10
          done

          echo "Package visibility did not become public." >&2
          exit 1

      - name: Verify anonymous manifest access to SHA tag
        env:
          IMAGE_NAME: ${{ needs.metadata.outputs.image_name }}
          SHA_TAG: ${{ needs.metadata.outputs.sha_tag }}
          DOCKER_CONFIG: ${{ runner.temp }}/docker-public
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          inspect_log="$(mktemp)"

          for attempt in $(seq 1 20); do
            if docker buildx imagetools inspect "${IMAGE_NAME}:${SHA_TAG}" >"$inspect_log" 2>&1; then
              rm -f "$inspect_log"
              exit 0
            fi
            echo "Anonymous manifest inspect attempt ${attempt} failed; retrying..." >&2
            tail -n 5 "$inspect_log" >&2 || true
            sleep 15
          done

          tail -n 20 "$inspect_log" >&2 || true
          rm -f "$inspect_log"
          echo "Failed to inspect ${IMAGE_NAME}:${SHA_TAG} anonymously." >&2
          exit 1

  promote-latest:
    name: Promote latest
    runs-on: ubuntu-latest
    needs:
      - metadata
      - verify-public
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote verified SHA tag to latest
        env:
          IMAGE_NAME: ${{ needs.metadata.outputs.image_name }}
          SHA_TAG: ${{ needs.metadata.outputs.sha_tag }}
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${SHA_TAG}"

      - name: Inspect latest tag
        env:
          IMAGE_NAME: ${{ needs.metadata.outputs.image_name }}
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE_NAME}:latest"
